services:
  forecast-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: store-sales-forecasting-api:local
    ports:
      - "8001:8000"
    environment:
      STORE_SALES_PROJECT_ROOT: /app
      STORE_SALES_MAX_PREDICTION_RECORDS: "30000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

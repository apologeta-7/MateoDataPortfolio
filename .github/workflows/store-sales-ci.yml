name: Store Sales CI

on:
  push:
    paths:
      - "store sales/**"
      - ".github/workflows/store-sales-ci.yml"
  pull_request:
    paths:
      - "store sales/**"
      - ".github/workflows/store-sales-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: store sales

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            store sales/requirements.txt
            store sales/requirements-dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Compile source
        run: python -m compileall api src scripts

      - name: Run tests
        env:
          STORE_SALES_PROJECT_ROOT: ${{ github.workspace }}/store sales
        run: python -m pytest

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build Docker image
        run: docker compose build

